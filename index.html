<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR-PERFUMES | Каталог</title>
    
    <meta property="og:title" content="VR-PERFUMES">
    <meta property="og:image" content="https://i.postimg.cc/CxkmFFJ3/logo.png">
    <meta property="og:description" content="Ексклюзивний розпив парфумерії у Хмельницькому">

    <style>
        :root { --main: #449244; --viber: #7360f2; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 10px; background: #fff; color: #333; }
        header { text-align: center; padding: 20px 0; }
        .logo { width: 120px; height: auto; margin-bottom: 10px; }
        .viber-btn { display: block; background: var(--viber); color: #fff; text-decoration: none; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; margin: 15px 0; font-size: 14px; }
        #catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { border: 1px solid #eee; border-radius: 15px; padding: 12px; display: flex; flex-direction: column; background: #fff; text-align: center; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; background: #f9f9f9; }
        .brand { font-weight: bold; font-size: 13px; text-transform: uppercase; margin-top: 10px; color: #000; }
        .name { font-size: 12px; color: #666; min-height: 32px; margin: 4px 0 8px; line-height: 1.2; }
        .price-info { font-size: 11px; color: var(--main); background: #f0f9f0; padding: 5px; border-radius: 6px; margin-bottom: 10px; font-weight: bold; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 12px; background: #fff; }
        .total { font-size: 20px; font-weight: 900; margin-bottom: 15px; color: #000; }
        .order-btn { background: #000; color: #fff; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .order-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/CxkmFFJ3/logo.png" alt="VR-PERFUMES" class="logo">
    <h1 style="font-size:22px; margin:0;">VR-PERFUMES</h1>
    <p style="font-size:12px; color:#888; margin:5px 0;">Ексклюзивний розпив • Хмельницький</p>
</header>

<a href="https://invite.viber.com/?g2=AQBjzS%2BM5uBAeFRYT57vm5okC%2BGV00WHPJgDJBWE9ptyotTAmhAhpYNBmtPwZxQe" class="viber-btn">ПРИЄДНАТИСЬ ДО VIBER-КАНАЛУ</a>

<div id="catalog">Завантаження ароматів...</div>

<script>
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSpreeDVfMb9m8VoH2fWjx3-P4e2XjpeFabLSODfQIBaLcXUA9T9xWfk4v_6R89JLgR-lvd0gwEakw)m8VoH2fWjx3-P4e2XjpeFabLSODfQIBaLcXUA9T9xWfk4v_6R89JLgR-lvd0gwEakwM/pub?gid=339534482&single=true&output=csv';
    const VIBER_NUMBER = '380962178464';
    const FORM_ACTION = 'https://formspree.io/f/xvgzlowq'; // Тимчасовий ID для відправки на вашу пошту

    async function loadCatalog() {
        try {
            const r = await fetch(SHEET_CSV + '&t=' + Date.now());
            const data = await r.text();
            const rows = data.split('\n').slice(1);
            const container = document.getElementById('catalog');
            container.innerHTML = '';

            rows.forEach(row => {
                const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
                if (c.length < 3 || !c[0]) return;

                const brand = c[0], name = c[1], price = parseFloat(c[2].replace(',','.')) || 0, 
                      min = parseInt(c[3]) || 2, img = c[5] || '';

                let options = '';
                [2, 5, 10].forEach(ml => {
                    if (ml >= min) {
                        let sum = ml * price;
                        if (ml === 10) sum *= 0.9;
                        options += `<option value="${ml}" data-p="${Math.round(sum)}">${ml} мл — ${Math.round(sum)} грн</option>`;
                    }
                });

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${img}" onerror="this.src='https://i.postimg.cc/CxkmFFJ3/logo.png'">
                    <div class="brand">${brand}</div>
                    <div class="name">${name}</div>
                    <div class="price-info">Ціна за 1 мл: ${Math.round(price)} грн</div>
                    <select onchange="this.nextElementSibling.innerText = this.options[this.selectedIndex].getAttribute('data-p') + ' грн'">${options}</select>
                    <div class="total">${Math.round(min * price)} грн</div>
                    <button class="order-btn" onclick="sendOrder('${brand} ${name}', this)">ЗАМОВИТИ</button>
                `;
                container.appendChild(card);
            });
        } catch (e) { console.error(e); }
    }

    function sendOrder(item, btn) {
        const select = btn.previousElementSibling.previousElementSibling;
        const ml = select.value;
        const sum = btn.previousElementSibling.innerText;
        const message = `🛍️ ЗАМОВЛЕННЯ: ${item}\nОб'єм: ${ml} мл\nСума: ${sum}`;

        // 1. Автоматична відправка на пошту (фоново)
        fetch(FORM_ACTION, {
            method: 'POST',
            body: JSON.stringify({ message: message, email: "vrshopping2017@gmail.com" }),
            headers: { 'Content-Type': 'application/json' }
        });

        // 2. Миттєвий перехід у Viber
        navigator.clipboard.writeText(message).then(() => {
            window.location.href = `viber://chat?number=%2B${VIBER_NUMBER}`;
            alert("Деталі замовлення скопійовано! Просто вставте їх у чат Viber.");
        });
    }

    loadCatalog();
</script>
</body>
</html>
