<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Scent Decant — Парфуми на розпив</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #faf9f6; color: #333; }
        header { padding: 20px; text-align: center; background: #fff; border-bottom: 1px solid #eee; }
        .hero { padding: 60px 20px; text-align: center; background: #f4f1ea; }
        .catalog { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; padding: 40px; }
        .card { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .card img { max-width: 100%; height: auto; border-radius: 4px; }
        .price-select { margin: 15px 0; }
        button { background: #2c2c2c; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
        button:hover { background: #000; }
    </style>
</head>
<body>

<header>
    <h1>SCENT DECANT</h1>
    <p>Твій ідеальний аромат у зручному форматі</p>
</header>

<section class="hero">
    <h2>Спробуй нішу, не купуючи повний флакон</h2>
    <p>Лише 100% оригінальна парфумерія</p>
</section>

<div class="catalog">
    <div class="card">
        <img src="https://via.placeholder.com/200x250" alt="Baccarat Rouge 540">
        <h3>Baccarat Rouge 540</h3>
        <p>Maison Francis Kurkdjian</p>
        <div class="price-select">
            <select>
                <option>3 мл — 450 грн</option>
                <option>5 мл — 720 грн</option>
                <option>10 мл — 1400 грн</option>
            </select>
        </div>
        <button>Додати в кошик</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200x250" alt="Lost Cherry">
        <h3>Lost Cherry</h3>
        <p>Tom Ford</p>
        <div class="price-select">
            <select>
                <option>3 мл — 550 грн</option>
                <option>5 мл — 890 грн</option>
                <option>10 мл — 1750 грн</option>
            </select>
        </div>
        <button>Додати в кошик</button>
    </div>
</div>

</body>
</html>
