<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR-PERFUMES | Каталог</title>
    <style>
        :root { --main: #449244; --viber: #7360f2; --bg: #f4f4f4; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 10px; background: var(--bg); color: #333; }
        header { text-align: center; padding: 15px; background: #fff; border-radius: 15px; margin-bottom: 10px; }
        .logo { width: 80px; height: auto; }
        .search-box { position: sticky; top: 10px; z-index: 100; background: #fff; padding: 12px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 2px solid var(--viber); }
        #searchInput { width: 100%; padding: 10px; border: none; font-size: 16px; outline: none; box-sizing: border-box; font-weight: bold; }
        .viber-channel { display: block; background: var(--viber); color: #fff; text-decoration: none; padding: 12px; border-radius: 10px; text-align: center; font-weight: bold; margin-bottom: 15px; font-size: 13px; }
        #catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        .card { position: relative; border-radius: 15px; padding: 10px; display: flex; flex-direction: column; background: #fff; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .new-badge { position: absolute; top: -5px; left: 50%; transform: translateX(-50%); background: var(--main); color: white; padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: bold; z-index: 10; border: 1px solid #fff; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; background: #f9f9f9; cursor: pointer; }
        .brand { font-weight: bold; font-size: 13px; margin-top: 10px; text-transform: uppercase; }
        .name { font-size: 12px; color: #666; height: 32px; margin: 4px 0; overflow: hidden; }
        .price-info { font-size: 11px; color: var(--main); font-weight: bold; margin-bottom: 8px; }
        select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; background: #fff; }
        .total { font-size: 18px; font-weight: 900; margin-bottom: 10px; }
        .order-btn { background: #000; color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; max-width: 400px; width: 100%; position: relative; }
        #copyNotice { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 25px; border-radius: 20px; z-index: 1000; text-align: center; width: 80%; max-width: 280px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.85); border: 3px solid var(--viber); }
    </style>
</head>
<body>
<header>
    <img src="https://i.postimg.cc/CxkmFFJ3/logo.png" class="logo">
    <h1 style="font-size:20px; margin:5px 0;">VR-PERFUMES</h1>
</header>
<div class="search-box"><input type="text" id="searchInput" placeholder="🔎 Пошук бренду або назви..." oninput="filterCatalog()"></div>
<a href="https://invite.viber.com/?g2=AQBjzS%2BM5uBAeFRYT57vm5okC%2BGV00WHPJgDJBWE9ptyotTAmhAhpYNBmtPwZxQe" class="viber-channel">ПРИЄДНАТИСЬ ДО VIBER</a>
<div id="catalog">Завантаження...</div>
<div id="infoModal" class="modal" onclick="this.style.display='none'"><div class="modal-content" onclick="event.stopPropagation()"><h3 id="modalBrand"></h3><p id="modalName"></p><p id="modalDesc"></p></div></div>
<div id="copyNotice"><b>СКОПІЙОВАНО!</b><p>Відкриваємо Viber. Натисніть <b>"ВСТАВИТИ"</b></p></div>

<script>
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSpreeDVfMb9m8VoH2fWjx3-P4e2XjpeFabLSODfQIBaLcXUA9T9xWfk4v_6R89JLgR-lvd0gwEakwM/pub?gid=339534482&single=true&output=csv';
    const VIBER_NUMBER = '380962178464';

    async function loadCatalog() {
        try {
            const r = await fetch(SHEET_CSV + '&t=' + Date.now());
            const text = await r.text();
            const lines = text.split('\n').slice(1);
            const container = document.getElementById('catalog');
            container.innerHTML = '';
            
            let items = [];
            lines.forEach(line => {
                const c = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
                if (c.length >= 3 && c[0]) {
                    items.push(c);
                }
            });

            // Надійне сортування
            items.sort((a, b) => {
                const dA = a[6] ? new Date(a[6]) : new Date(0);
                const dB = b[6] ? new Date(b[6]) : new Date(0);
                return dB - dA;
            });

            const today = new Date();
            items.forEach(c => {
                const brand = c[0], name = c[1], price = parseFloat(c[2].replace(',','.')) || 0, min = parseInt(c[3]) || 2, desc = c[4] || '', img = c[5] || '', dateRaw = c[6] || '';
                const date = dateRaw ? new Date(dateRaw) : null;
                const isNew = date && (today - date) / (1000 * 60 * 60 * 24) <= 14;

                let options = '';
                [2, 5, 10].forEach(ml => { if (ml >= min) options += `<option value="${ml}" data-p="${Math.round(ml*price)}">${ml} мл — ${Math.round(ml*price)} грн</option>`; });

                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-search', (brand + ' ' + name).toLowerCase());
                card.innerHTML = `${isNew ? '<div class="new-badge">Новинка!</div>' : ''}
                    <img src="${img}" onclick="showInfo('${brand}','${name}','${desc.replace(/'/g,"")}')" onerror="this.src='https://i.postimg.cc/CxkmFFJ3/logo.png'">
                    <div class="brand">${brand}</div><div class="name">${name}</div>
                    <div class="price-info">1 мл = ${Math.round(price)} грн</div>
                    <select onchange="this.nextElementSibling.innerText = this.options[this.selectedIndex].getAttribute('data-p') + ' грн'">${options}</select>
                    <div class="total">${Math.round(min * price)} грн</div>
                    <button class="order-btn" onclick="sendToViber('${brand} ${name}', this)">ЗАМОВИТИ</button>`;
                container.appendChild(card);
            });
        } catch (e) { document.getElementById('catalog').innerHTML = "Помилка даних. Перевірте таблицю."; }
    }

    function showInfo(b, n, d) { document.getElementById('modalBrand').innerText = b; document.getElementById('modalName').innerText = n; document.getElementById('modalDesc').innerText = d || "Опис додається..."; document.getElementById('infoModal').style.display = 'flex'; }
    function filterCatalog() { const q = document.getElementById('searchInput').value.toLowerCase(); document.querySelectorAll('.card').forEach(c => { c.style.display = c.getAttribute('data-search').includes(q) ? 'flex' : 'none'; }); }
    function sendToViber(item, btn) {
        const sel = btn.previousElementSibling.previousElementSibling;
        const msg = `🛍️ ЗАМОВЛЕННЯ:\n${item}\nОб'єм: ${sel.value} мл\nСума: ${btn.previousElementSibling.innerText}`;
        const t = document.createElement("textarea"); t.value = msg; document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t);
        document.getElementById('copyNotice').style.display = 'block';
        setTimeout(() => { window.location.href = `viber://chat?number=%2B${VIBER_NUMBER}`; }, 1500);
    }
    loadCatalog();
</script>
</body>
</html>
