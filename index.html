<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR-PERFUMES</title>
    <style>
        :root { 
            --bg: #f8f9fa; 
            --gold: #d4af37;
            --tg-color: #0088cc; 
            --viber-color: #7360f2;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 12px; background: var(--bg); color: #000; 
            padding-bottom: 90px;
        }

        /* Шапка */
        header { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px 0; background: #000; 
            margin: -12px -12px 20px -12px;
            border-bottom: 2px solid var(--gold);
        }
        .logo { width: 70px; height: auto; margin-bottom: 8px; }
        header h1 { font-size: 16px; font-weight: 800; letter-spacing: 4px; color: #fff; text-transform: uppercase; margin: 0; }

        /* Пошук */
        .search-box { 
            position: sticky; top: 10px; z-index: 100; 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            padding: 5px 15px; border-radius: 25px; margin-bottom: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee;
            display: flex; align-items: center;
        }
        #searchInput { width: 100%; padding: 10px; border: none; background: transparent; outline: none; }

        /* Кнопка Viber (Фірмовий колір) */
        .viber-link { 
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: var(--viber-color); color: #fff; text-decoration: none; 
            padding: 12px; border-radius: 12px; font-weight: 700; margin-bottom: 25px;
        }

        /* Картки */
        #catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .card { 
            position: relative; background: #fff; border-radius: 15px; padding: 12px; 
            display: flex; flex-direction: column; text-align: center; border: 1px solid #eee;
        }
        
        /* Кольорові фото без фільтрів */
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; }

        .new-badge { 
            position: absolute; top: 10px; right: 10px; background: #000; color: #fff; 
            padding: 4px 8px; border-radius: 5px; font-size: 9px; font-weight: 800; text-transform: uppercase;
        }

        .brand { font-weight: 800; font-size: 12px; margin-top: 10px; text-transform: uppercase; }
        .name { font-size: 12px; color: #666; margin: 4px 0; height: 32px; overflow: hidden; }
        
        /* Ціна за 1 мл */
        .price-ml { font-size: 11px; color: #888; margin-bottom: 8px; background: #f9f9f9; padding: 4px; border-radius: 5px; }

        select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 10px; }
        .total { font-size: 18px; font-weight: 800; margin-bottom: 12px; }

        /* Чорна кнопка як на картинці */
        .order-btn { background: #000; color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; }

        /* Плаваючі кнопки (Фірмові кольори) */
        .fab-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
        .fab { width: 55px; height: 55px; border-radius: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .fab img { width: 25px; height: 25px; filter: brightness(0) invert(1); }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/CxkmFFJ3/logo.png" class="logo">
    <h1>VR PERFUMES</h1>
</header>

<div class="search-box">
    <span>🔎</span>
    <input type="text" id="searchInput" placeholder="Пошук аромату..." oninput="filterCatalog()">
</div>

<a href="https://invite.viber.com/..." class="viber-link">Приєднатися до нашого Viber</a>

<div id="catalog"></div>

<div class="fab-container">
    <a href="https://t.me/viktoriia_viktoriia_r" class="fab" style="background: var(--tg-color);"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png"></a>
    <a href="viber://chat?number=%2B380962178464" class="fab" style="background: var(--viber-color);"><img src="https://cdn-icons-png.flaticon.com/512/733/733641.png"></a>
</div>

<script>
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSpreeDVfMb9m8VoH2fWjx3-P4e2XjpeFabLSODfQIBaLcXUA9T9xWfk4v_6R89JLgR-lvd0gwEakwM/pub?gid=339534482&single=true&output=csv';

    async function load() {
        const r = await fetch(SHEET_CSV + '&v=' + Date.now());
        const data = await r.text();
        const rows = data.split('\n').slice(1).map(line => line.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim()));
        
        const container = document.getElementById('catalog');
        rows.forEach(c => {
            if(!c[0]) return;
            const [brand, name, price, min, desc, img, date] = c;
            const isNew = (new Date() - new Date(date)) / 86400000 <= 14;
            
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                ${isNew ? '<div class="new-badge">Новинка</div>' : ''}
                <img src="${img}">
                <div class="brand">${brand}</div>
                <div class="name">${name}</div>
                <div class="price-ml">Ціна за 1 мл: <b>${Math.round(price)} грн</b></div>
                <select onchange="updatePrice(this, ${price})">
                    <option value="2">2 мл — ${Math.round(price*2)} грн</option>
                    <option value="5">5 мл — ${Math.round(price*5)} грн</option>
                    <option value="10">10 мл — ${Math.round(price*10)} грн</option>
                </select>
                <div class="total">${Math.round(price * 2)} грн</div>
                <button class="order-btn" onclick="order('${brand} ${name}', this)">ЗАМОВИТИ</button>
            `;
            container.appendChild(div);
        });
    }

    function updatePrice(sel, p) {
        sel.nextElementSibling.innerText = Math.round(sel.value * p) + ' грн';
    }

    function order(item, btn) {
        const ml = btn.previousElementSibling.previousElementSibling.value;
        const total = btn.previousElementSibling.innerText;
        window.open(`https://t.me/viktoriia_viktoriia_r?text=Замовлення: ${item}, ${ml}мл, ${total}`, '_top');
    }

    load();
</script>
</body>
</html>
