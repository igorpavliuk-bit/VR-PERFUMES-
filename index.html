<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR-PERFUMES | Premium Showcase</title>
    <style>
        :root { 
            --bg: #ffffff; 
            --gold: #d4af37;
            --tg-color: #0088cc; 
            --viber-color: #7360f2;
            --text-dark: #111111;
            --gray-light: #f5f5f5;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; 
            margin: 0; padding: 0; background: var(--bg); color: var(--text-dark); 
            padding-bottom: 90px; -webkit-tap-highlight-color: transparent;
        }

        .tt-hint { 
            background: #fff; color: #333; padding: 12px; text-align: center; font-size: 11px; 
            border-bottom: 1px solid #eee; line-height: 1.5; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase;
        }

        /* --- Герой-Слайдер (ЗАМІСТЬ ХЕДЕРА) --- */
        .hero-carousel {
            position: relative; height: 160px; overflow: hidden; background: #000; border-bottom: 1px solid #1a1a1a; cursor: pointer;
        }
        .slide {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 1s ease-in-out; z-index: 1; pointer-events: none;
        }
        .slide.active { opacity: 1; z-index: 2; pointer-events: auto; }

        .logo-slide { background: #000; }
        .logo { width: 65px; height: auto; margin-bottom: 10px; }
        .hero-carousel h1 { font-size: 14px; font-weight: 600; letter-spacing: 5px; margin: 0; color: var(--gold); text-transform: uppercase; }

        .banner-content { text-align: left; padding: 20px 30px; width: 100%; box-sizing: border-box; color: #fff; }
        .banner-subtitle { display: block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); margin-bottom: 5px; }
        .banner-title { display: block; font-size: 26px; font-weight: 300; text-transform: uppercase; letter-spacing: 1px; line-height: 1.1; margin-bottom: 12px; font-family: Georgia, 'Times New Roman', Times, serif; }
        .banner-btn { display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; padding: 6px 15px; border: 1px solid rgba(255,255,255,0.3); border-radius: 2px; transition: all 0.3s; }
        .slide:active .banner-btn { background: #fff; color: #000; border-color: #fff; }

        .banner-new { background: linear-gradient(135deg, #000000 0%, #0d1a0d 100%); }
        .banner-top { background: linear-gradient(135deg, #000000 0%, #1a140d 100%); }

        /* Бігучий рядок */
        .news-ticker { background: var(--gold); color: #000; padding: 8px 0; overflow: hidden; white-space: nowrap; }
        .news-ticker-content { display: inline-block; padding-left: 100%; animation: ticker 25s linear infinite; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
        @keyframes ticker { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        /* Контролі та Навігація */
        .controls-wrapper { padding: 15px 15px 5px; position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid #eee; }
        .search-box { margin-bottom: 12px; }
        #searchInput { width: 100%; padding: 12px 15px; border: 1px solid #e0e0e0; background: var(--gray-light); font-size: 14px; outline: none; border-radius: 4px; box-sizing: border-box; transition: border 0.3s; }
        #searchInput:focus { border-color: var(--gold); background: #fff; }
        
        .action-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
        .viber-link, .news-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; padding: 10px; border-radius: 4px; text-align: center; font-weight: 600; font-size: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; position: relative; }
        .viber-link { background: var(--viber-color); color: #fff; }
        .news-btn { background: #fff; border: 1px solid #000; color: #000; }

        .tabs-container { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .tabs-container::-webkit-scrollbar { display: none; }
        .tab-btn { background: none; border: none; font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 1px; padding: 5px 0; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: all 0.3s; }
        .tab-btn.active { color: #000; border-bottom-color: var(--gold); }

        /* Хмарка новин */
        .news-tooltip { position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 8px 12px; border-radius: 4px; font-size: 11px; font-weight: 700; line-height: 1.3; width: max-content; max-width: 150px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); opacity: 0; visibility: hidden; transition: all 0.4s ease; z-index: 100; pointer-events: none; }
        .news-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; margin-left: -5px; border-width: 5px; border-style: solid; border-color: var(--gold) transparent transparent transparent; }
        .news-tooltip.show { opacity: 1; visibility: visible; bottom: 135%; }

        /* Каталог */
        #catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px 15px; padding: 20px 15px; }
        .card { position: relative; display: flex; flex-direction: column; background: #fff; text-align: center; }
        
        .badges-container { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 4px; z-index: 10; }
        .badge { padding: 4px 8px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border-radius: 2px; }
        .badge-new { background: #000; color: #fff; }
        .badge-top { background: var(--gold); color: #000; }

        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; cursor: pointer; background: var(--gray-light); }
        .brand { font-weight: 700; font-size: 10px; margin-top: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: #777; }
        .name { font-size: 13px; color: #111; height: 34px; margin: 6px 0 10px; overflow: hidden; line-height: 1.3; font-weight: 500; }
        .price-ml { font-size: 11px; color: #888; margin-bottom: 8px; }
        
        select { width: 100%; padding: 8px 10px; border: 1px solid #eee; margin-bottom: 12px; background: #fff; outline: none; font-size: 13px; border-radius: 4px; color: #333; box-sizing: border-box; }
        .total { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: #000; }
        .order-btn { background: #000; color: #fff; border: none; padding: 12px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-size: 11px; border-radius: 4px; transition: background 0.3s; }
        .order-btn:active { background: var(--gold); color: #000; }

        /* --- ОНОВЛЕНИЙ РОЗДІЛ: ІНШІ ПРОЄКТИ (Круглі іконки) --- */
        .other-projects { padding: 40px 15px 30px; background: #fff; text-align: center; border-top: 1px solid #eee; }
        /* Акуратний заголовок у стилі Jan */
        .other-projects h2 { font-size: 14px; letter-spacing: 2.5px; color: #111; font-weight: 600; font-family: Georgia, serif; margin: 0 0 30px; text-transform: uppercase; }
        
        .other-projects-container { display: flex; gap: 20px; justify-content: center; center; }
        
        /* Нові стилі для круглого елемента Jan-meets-Social-Icons */
        .other-project-item { 
            flex: 0 0 70px; 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            overflow: hidden; 
            background-color: #fff; /* Білий фон */
            border: 1px solid #eee; /* Дуже тонка сіра рамка */
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); /* Легка тінь */
            text-align: center; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-sizing: border-box; 
            transition: all 0.3s;
        }
        .other-project-item:active { transform: scale(1.05); }

        .other-project-link { display: block; width: 100%; height: 100%; text-decoration: none; position: relative; border-radius: 50%; }
        
        /* Картинка: contain, щоб було видно все лого всередині круга */
        .other-project-item img { 
            display: block; 
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* Картинка повністю всередині, з білим фоном навколо */
            object-position: center; /* Центрує */
            padding: 0; 
            margin: 0; 
            border-radius: 50%;
        }
        
        /* Модальні вікна */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: #fff; padding: 30px 25px; max-width: 400px; width: 100%; position: relative; text-align: center; max-height: 85vh; overflow-y: auto; border: 1px solid #eee; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        .modal-content h3 { margin-top: 0; font-size: 18px; letter-spacing: 1px; text-transform: uppercase; font-family: Georgia, serif; }
        .news-link { color: #000; font-weight: 700; text-decoration: underline; cursor: pointer; text-decoration-color: var(--gold); text-decoration-thickness: 2px; }
        .close-btn { background: #fff; border: 1px solid #000; color: #000; padding: 12px; width: 100%; margin-top: 25px; cursor: pointer; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; font-size: 12px; border-radius: 4px; }

        .fab-container { position: fixed; bottom: 20px; right: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 999; }
        .fab { width: 50px; height: 50px; border-radius: 25px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .fab img { width: 22px; height: 22px; filter: brightness(0) invert(1); }
    </style>
</head>

        <button class="close-btn" onclick="document.getElementById('newsModalWindow').style.display='none'">Закрити</button>
    </div>
</div>

<script>
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSpreeDVfMb9m8VoH2fWjx3-P4e2XjpeFabLSODfQIBaLcXUA9T9xWfk4v_6R89JLgR-lvd0gwEakwM/pub?gid=339534482&single=true&output=csv';
    const TG_NICK = 'viktoriia_viktoriia_r'; 
    
    let globalCatalog = []; 
    let currentCategory = 'all'; 

    const TRENDS = [
        'baccarat', 'ganymede', 'tonka cola', 'wood sage', 'vanilla vibes', 'musk kashmir', 'blackberry', 'pomelo sorrento', 'soleil de capri', 'pear inc', 'this is her', 'fleur narcotique', 'lost cherry', 'tobacco vanille', 'delina', 'bianco latte', 'kirke', 'musc k'
    ];

    function safeParseCSV(str) {
        let arr = [];
        let quote = false;
        let row = 0, col = 0;
        for (let c = 0; c < str.length; c++) {
            let cc = str[c], nc = str[c+1];
            arr[row] = arr[row] || [];
            arr[row][col] = arr[row][col] || '';
            
            if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
            if (cc == '"') { quote = !quote; continue; }
            if (cc == ',' && !quote) { ++col; continue; }
            if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
            if (cc == '\n' && !quote) { ++row; col = 0; continue; }
            if (cc == '\r' && !quote) { ++row; col = 0; continue; }
            
            arr[row][col] += cc;
        }
        return arr.map(r => r.map(v => v.trim()));
    }

    async function load() {
        try {
            const r = await fetch(SHEET_CSV + '&v=' + Date.now());
            const data = await r.text();
            
            const rows = safeParseCSV(data);
            
            if(rows[0] && rows[0][9]) document.getElementById('newsTicker').innerText = rows[0][9];

            const catalogData = rows.slice(1).filter(c => c[0]); 
            globalCatalog = catalogData.map(c => ({brand: c[0]||'', name: c[1]||'', desc: c[4]||''}));

            let rawNews = (rows[0] && rows[0][10]) ? rows[0][10] : "Скоро тут з'являться наші новини! ✨";
            let cleanTextForTooltip = rawNews.replace(/[{}]/g, ''); 
            let tooltipPreview = cleanTextForTooltip.substring(0, 45) + (cleanTextForTooltip.length > 45 ? '...' : '');
            document.getElementById('newsTooltip').innerText = tooltipPreview;
            
            startNewsTooltipAnimation();
            startHeroCarousel(); 

            let formattedNews = rawNews.replace(/\n/g, '<br>'); 
            const processedNews = formattedNews.replace(/\{(.*?)\}/g, (match, perfumeName) => {
                return `<span class="news-link" onclick="orderPerfumeFromNews('${perfumeName}')">${perfumeName}</span>`;
            });
            document.getElementById('newsModalContent').innerHTML = processedNews;

            catalogData.sort((a, b) => {
                const dateA = new Date(a[6] || '2000-01-01');
                const dateB = new Date(b[6] || '2000-01-01');
                return dateB - dateA;
            });

            const today = new Date();
            const container = document.getElementById('catalog');
            container.innerHTML = '';
            
            catalogData.forEach(c => {
                const brand = c[0] || '';
                const name = c[1] || '';
                const priceStr = c[2] || '0';
                const minStr = c[3] || '2';
                const desc = c[4] || '';
                const img = c[5] || '';
                const dateStr = c[6] || '';
                const customTop = c[7] || '';

                const price = parseFloat(priceStr.replace(/,/g, '.')) || 0;
                const min = parseInt(minStr) || 2;
                
                let isNew = false;
                if (dateStr) {
                    const itemDate = new Date(dateStr);
                    if (!isNaN(itemDate)) {
                        const diffDays = (today - itemDate) / (1000 * 60 * 60 * 24);
                        if (diffDays >= 0 && diffDays <= 14) isNew = true;
                    }
                }

                let isTop = false;
                const fullNameLower = (brand + ' ' + name).toLowerCase();
                if (TRENDS.some(trend => fullNameLower.includes(trend))) isTop = true;
                if (customTop && customTop.toLowerCase().includes('топ')) isTop = true;

                const cleanB = brand.replace(/'/g, "’");
                const cleanN = name.replace(/'/g, "’");
                const cleanD = desc ? desc.replace(/'/g, "’").replace(/"/g, "«") : "Опис скоро з’явиться...";

                const div = document.createElement('div');
                div.className = 'card';
                div.setAttribute('data-search', fullNameLower);
                div.setAttribute('data-new', isNew);
                div.setAttribute('data-top', isTop);
                
                let optionsHtml = '';
                [2, 5, 10, 20].forEach(ml => {
                    if (ml >= min) optionsHtml += `<option value="${ml}">${ml} мл — ${Math.round(ml * price)} грн</option>`;
                });

                let badgesHtml = '<div class="badges-container">';
                if (isNew) badgesHtml += '<div class="badge badge-new">Новинка</div>';
                if (isTop) badgesHtml += '<div class="badge badge-top">Best Seller</div>';
                badgesHtml += '</div>';

                div.innerHTML = `
                    ${badgesHtml}
                    <img loading="lazy" src="${img}" onclick="showModal('${cleanB}', '${cleanN}', '${cleanD}')" onerror="this.src='https://i.postimg.cc/CxkmFFJ3/logo.png'">
                    <div class="brand">${brand}</div>
                    <div class="name">${name}</div>
                    <div class="price-ml">1 мл: <b>${Math.round(price)} грн</b></div>
                    <select onchange="updatePrice(this, ${price})">${optionsHtml}</select>
                    <div class="total">${Math.round(min * price)} грн</div>
                    <button class="order-btn" onclick="order('${cleanB} ${cleanN}', this)">ЗАМОВИТИ</button>
                `;
                container.appendChild(div);
            });
        } catch (e) { 
            console.error(e); 
            document.getElementById('catalog').innerHTML = "Помилка завантаження даних. Будь ласка, оновіть сторінку.";
        }
    }

    function startHeroCarousel() {
        const slides = document.querySelectorAll('#heroCarousel .slide');
        let currentSlide = 0;
        setInterval(() => {
            slides[currentSlide].classList.remove('active'); 
            currentSlide = (currentSlide + 1) % slides.length; 
            slides[currentSlide].classList.add('active'); 
        }, 5000); 
    }

    function navigateToCategory(category) {
        const tabBtn = document.getElementById('tab-' + category);
        if (tabBtn) {
            setCategory(category, tabBtn); 
            window.scrollTo({ top: document.querySelector('.controls-wrapper').offsetTop, behavior: 'smooth' });
        }
    }

    function setCategory(category, btnElement) {
        currentCategory = category;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        filterCatalog();
    }

    function filterCatalog() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            const matchesSearch = c.getAttribute('data-search').includes(q);
            let matchesCategory = true;
            if (currentCategory === 'new') matchesCategory = c.getAttribute('data-new') === 'true';
            else if (currentCategory === 'top') matchesCategory = c.getAttribute('data-top') === 'true';
            c.style.display = (matchesSearch && matchesCategory) ? 'flex' : 'none';
        });
    }

    function startNewsTooltipAnimation() {
        const tooltip = document.getElementById('newsTooltip');
        setTimeout(() => { tooltip.classList.add('show'); setTimeout(() => tooltip.classList.remove('show'), 4000); }, 3000);
        setInterval(() => { tooltip.classList.add('show'); setTimeout(() => tooltip.classList.remove('show'), 4000); }, 15000);
    }

    function showModal(b, n, d) {
        document.getElementById('mB').innerText = b;
        document.getElementById('mN').innerText = n;
        document.getElementById('mD').innerText = d;
        document.getElementById('infoModal').style.display = 'flex';
    }

    function orderPerfumeFromNews(query) {
        document.getElementById('newsModalWindow').style.display = 'none';
        const q = query.toLowerCase().trim();
        const item = globalCatalog.find(c => {
            const fullName = (c.brand + ' ' + c.name).toLowerCase();
            return fullName.includes(q) || c.name.toLowerCase().includes(q);
        });
        const perfumeName = item ? (item.brand + ' ' + item.name) : query;
        const text = `🛍️ ЗАМОВЛЕННЯ (з Новин):\nАромат: ${perfumeName}\n\nПідкажіть, будь ласка, які об'єми доступні для розпиву?`;
        window.open(`https://t.me/${TG_NICK}?text=${encodeURIComponent(text)}`, '_top');
    }

    function updatePrice(sel, p) { sel.nextElementSibling.innerText = Math.round(sel.value * p) + ' грн'; }

    function order(item, btn) {
        const ml = btn.previousElementSibling.previousElementSibling.value;
        const total = btn.previousElementSibling.innerText;
        window.open(`https://t.me/${TG_NICK}?text=${encodeURIComponent('🛍️ ЗАМОВЛЕННЯ:\n' + item + '\nОб\'єм: ' + ml + ' мл\nСума: ' + total)}`, '_top');
    }

    load();
</script>
</body>
</html>
