<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR-PERFUMES</title>
    <style>
        :root { --main: #449244; --viber: #7360f2; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 10px; background: #fff; }
        header { text-align: center; padding: 15px 0; }
        .logo { width: 100px; height: auto; }
        .viber-btn { display: block; background: var(--viber); color: #fff; text-decoration: none; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; margin: 15px 0; }
        #catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { border: 1px solid #eee; border-radius: 15px; padding: 12px; display: flex; flex-direction: column; background: #fff; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; background: #f9f9f9; cursor: pointer; }
        .brand { font-weight: bold; font-size: 13px; text-transform: uppercase; margin-top: 10px; }
        .name { font-size: 12px; color: #666; min-height: 30px; margin: 5px 0; }
        .price-ml { color: var(--main); font-weight: bold; font-size: 12px; margin-bottom: 8px; }
        select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; }
        .total { font-size: 18px; font-weight: 900; text-align: center; margin-bottom: 12px; }
        .order-btn { background: #000; color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .modal { display: none; position: fixed; z-index: 99; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.com/YCVpT9bK/vr-perfumes-logo.png" class="logo">
    <h1 style="font-size:20px; margin:10px 0 0;">VR-PERFUMES</h1>
    <p style="font-size:11px; color:#999; margin:5px 0;">Ексклюзивний розпив • Хмельницький</p>
</header>

<a href="https://invite.viber.com/?g2=AQBjzS%2BM5uBAeFRYT57vm5okC%2BGV00WHPJgDJBWE9ptyotTAmhAhpYNBmtPwZxQe" class="viber-btn">ПРИЄДНАТИСЬ ДО VIBER-КАНАЛУ</a>

<div id="catalog">Завантаження...</div>

<div id="modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="m-title" style="margin-top:0;"></h3>
        <p id="m-desc" style="line-height:1.5; color:#444; font-size:14px; white-space: pre-wrap;"></p>
    </div>
</div>

<script>
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSpreeDVfMb9m8VoH2fWjx3-P4e2XjpeFabLSODfQIBaLcXUA9T9xWfk4v_6R89JLgR-lvd0gwEakwM/pub?gid=339534482&single=true&output=csv';

    async function load() {
        try {
            const r = await fetch(SHEET_CSV + '&t=' + Date.now());
            const data = await r.text();
            const rows = data.split('\n').slice(1);
            const container = document.getElementById('catalog');
            container.innerHTML = '';

            rows.forEach(row => {
                const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
                if (c.length < 3 || !c[0]) return;

                const brand = c[0], name = c[1], price = parseFloat(c[2].replace(',','.')) || 0, 
                      min = parseInt(c[3]) || 2, desc = c[4] || '', img = c[5] || '';

                if (price === 0) return;

                let options = '';
                [2, 5, 10].forEach(ml => {
                    if (ml >= min) {
                        let sum = ml * price;
                        if (ml === 10) sum *= 0.9;
                        options += `<option value="${ml}" data-p="${Math.round(sum)}">${ml} мл — ${Math.round(sum)} грн</option>`;
                    }
                });

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${img}" onerror="this.src='https://i.postimg.cc/CxkmFFJ3/logo.png'" onclick="show('${brand} ${name}', '${desc}')">
                    <div class="brand">${brand}</div>
                    <div class="name">${name}</div>
                    <div class="price-ml">${Math.round(price)} грн / мл</div>
                    <select onchange="this.nextElementSibling.innerText = this.options[this.selectedIndex].getAttribute('data-p') + ' грн'">${options}</select>
                    <div class="total">${Math.round(min * price)} грн</div>
                    <button class="order-btn" onclick="order('${brand} ${name}', this)">ЗАМОВИТИ</button>
                `;
                container.appendChild(card);
            });
        } catch (e) { console.error(e); }
    }

    function show(t, d) {
        document.getElementById('m-title').innerText = t;
        document.getElementById('m-desc').innerText = d;
        document.getElementById('modal').style.display = 'flex';
    }

    function order(item, btn) {
        const ml = btn.previousElementSibling.previousElementSibling.value;
        const sum = btn.previousElementSibling.innerText;
        const msg = `🛍️ ЗАМОВЛЕННЯ:\n${item}\nОб'єм: ${ml} мл\nСума: ${sum}`;
        navigator.clipboard.writeText(msg).then(() => {
            window.location.href = "viber://chat?number=%2B380962178464";
            alert("Скопійовано! Вставте текст у Viber.");
        });
    }

    load();
</script>
</body>
</html>
