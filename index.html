<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR-PERFUMES | Каталог</title>
    <style>
        :root { --viber: #7360f2; --main: #449244; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 10px; background: #f8f9fa; color: #333; }
        header { text-align: center; padding: 20px 0; }
        .logo { width: 140px; margin-bottom: 10px; }
        h1 { font-size: 22px; text-transform: uppercase; margin: 0; font-weight: 900; }
        .viber-btn { display: block; background: var(--viber); color: #fff; text-decoration: none; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; margin: 15px 0; font-size: 14px; }
        
        #catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { background: #fff; border-radius: 15px; padding: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; background: #eee; cursor: pointer; }
        
        .brand { font-weight: bold; font-size: 12px; margin: 10px 0 2px; text-transform: uppercase; }
        .name { font-size: 12px; color: #666; margin-bottom: 5px; min-height: 30px; line-height: 1.2; }
        
        /* Новий блок ціни за мл */
        .price-info { color: var(--main); font-weight: bold; font-size: 11px; margin-bottom: 10px; padding: 4px 8px; background: #f0f7f0; border-radius: 5px; display: inline-block; align-self: flex-start; }
        
        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 10px; background: #fff; font-size: 14px; }
        .total-price { font-size: 19px; font-weight: 900; text-align: center; margin-bottom: 12px; }
        .order-btn { background: #000; color: #fff; text-decoration: none; padding: 12px; border-radius: 10px; text-align: center; font-weight: bold; font-size: 13px; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; position: relative; }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/CxkmFFJ3/logo.png" alt="VR-PERFUMES" class="logo">
    <h1>VR-PERFUMES</h1>
</header>

<a href="https://invite.viber.com/?g2=AQBjzS%2BM5uBAeFRYT57vm5okC%2BGV00WHPJgDJBWE9ptyotTAmhAhpYNBmtPwZxQe" class="viber-btn">ПРИЄДНАТИСЬ ДО VIBER-КАНАЛУ</a>

<div id="catalog">Завантаження ароматів...</div>

<div id="modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="m-title" style="margin-top:0;"></h3>
        <p id="m-text" style="line-height:1.5; color:#444;"></p>
    </div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSpreeDVfMb9m8VoH2fWjx3-P4e2XjpeFabLSODfQIBaLcXUA9T9xWfk4v_6R89JLgR-lvd0gwEakwM/pub?gid=339534482&single=true&output=csv';

    async function loadCatalog() {
        try {
            const response = await fetch(SHEET_URL + '&t=' + Date.now());
            const data = await response.text();
            
            const lines = data.split('\n');
            const container = document.getElementById('catalog');
            container.innerHTML = '';

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;

                // Простий поділ рядка
                const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                const brand = cols[0].replace(/"/g, '').trim();
                const name = cols[1].replace(/"/g, '').trim();
                const price = parseFloat(cols[2].replace(/"/g, '').replace(',', '.'));
                const notes = cols[3] ? cols[3].replace(/"/g, '').trim() : "Опис очікується...";
                const img = cols[4] ? cols[4].replace(/"/g, '').trim() : '';

                if (isNaN(price)) continue;

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${img}" onclick="openInfo('${brand} ${name}', '${notes}')" onerror="this.src='https://via.placeholder.com/300?text=VR'">
                    <div class="brand">${brand}</div>
                    <div class="name">${name}</div>
                    <div class="price-info">Ціна: ${Math.round(price)} грн / мл</div>
                    <select onchange="updatePrice(this, ${price})">
                        <option value="2">2 мл — ${Math.round(price * 2)} грн</option>
                        <option value="5">5 мл — ${Math.round(price * 5)} грн</option>
                        <option value="10">10 мл — ${Math.round(price * 10 * 0.9)} грн</option>
                    </select>
                    <div class="total-price">${Math.round(2 * price)} грн</div>
                    <a href="#" class="order-btn" onclick="sendOrder('${brand} ${name}', this)">ЗАМОВИТИ</a>
                `;
                container.appendChild(card);
            }
        } catch (error) {
            document.getElementById('catalog').innerText = 'Помилка завантаження. Перевірте з’єднання.';
        }
    }

    function updatePrice(select, price) {
        let ml = parseInt(select.value);
        let total = Math.round(ml * price);
        if (ml === 10) total = Math.round(total * 0.9);
        select.nextElementSibling.innerText = total + ' грн';
    }

    function openInfo(title, text) {
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-text').innerText = text;
        document.getElementById('modal').style.display = 'flex';
    }

    function sendOrder(item, btn) {
        const select = btn.previousElementSibling.previousElementSibling;
        const total = btn.previousElementSibling.innerText;
        const msg = `🛍️ ЗАМОВЛЕННЯ:\n${item}\nОб'єм: ${select.value} мл\nСума: ${total}`;
        
        navigator.clipboard.writeText(msg).then(() => {
            window.location.href = "viber://chat?number=%2B380962178464";
            setTimeout(() => alert("Текст замовлення скопійовано!"), 500);
        });
    }

    loadCatalog();
</script>
</body>
</html>
