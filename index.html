<style>
    /* Сучасний мінімалістичний пошук */
    .search-box { 
        position: sticky; 
        top: 10px; 
        z-index: 100; 
        background: rgba(255, 255, 255, 0.85); /* Напівпрозорий фон */
        backdrop-filter: blur(12px); /* Ефект розмиття фону */
        -webkit-backdrop-filter: blur(12px);
        padding: 4px 18px; 
        border-radius: 30px; 
        margin: 0 5px 25px 5px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.06); /* Дуже м'яка тінь */
        border: 1px solid rgba(255, 255, 255, 0.5);
        display: flex; 
        align-items: center;
        transition: all 0.3s ease;
    }

    /* Зміна стилю при фокусі (натисканні) */
    .search-box:focus-within {
        background: #fff;
        box-shadow: 0 12px 30px rgba(0,0,0,0.1);
        transform: translateY(-1px);
    }

    .search-icon {
        font-size: 16px;
        opacity: 0.4;
        margin-right: 10px;
    }

    #searchInput { 
        width: 100%; 
        padding: 12px 0; 
        border: none; 
        background: transparent; 
        font-size: 15px; 
        outline: none; 
        color: #000;
    }

    /* Стиль плейсхолдера (тексту всередині) */
    #searchInput::placeholder {
        color: #a0a0a0;
        font-weight: 400;
    }
</style>

<div class="search-box">
    <span class="search-icon">🔎</span>
    <input type="text" id="searchInput" placeholder="Знайти аромат або бренд..." oninput="filterCatalog()">
</div>
