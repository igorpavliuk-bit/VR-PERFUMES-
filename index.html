<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR-PERFUMES | Каталог</title>
    
    <meta property="og:title" content="VR-PERFUMES">
    <meta property="og:image" content="https://i.postimg.cc/CxkmFFJ3/logo.png">

    <style>
        :root { --main: #449244; --viber: #7360f2; --bg: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 10px; background: #f4f4f4; color: #333; }
        
        header { text-align: center; padding: 15px; background: #fff; border-radius: 15px; margin-bottom: 10px; }
        .logo { width: 80px; height: auto; }
        
        /* БЛОК ПОШУКУ - Яскравий та помітний */
        .search-box { 
            position: sticky; top: 10px; z-index: 100; 
            background: #fff; padding: 12px; border-radius: 15px; 
            margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border: 2px solid var(--viber);
        }
        #searchInput { 
            width: 100%; padding: 10px; border: none; 
            font-size: 16px; outline: none; box-sizing: border-box;
            font-weight: bold;
        }

        .viber-channel { display: block; background: var(--viber); color: #fff; text-decoration: none; padding: 12px; border-radius: 10px; text-align: center; font-weight: bold; margin-bottom: 15px; font-size: 13px; }
        
        #catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        
        /* Картка */
        .card { position: relative; border-radius: 15px; padding: 10px; display: flex; flex-direction: column; background: #fff; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .new-badge { position: absolute; top: -5px; left: 50%; transform: translateX(-50%); background: var(--main); color: white; padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: bold; z-index: 10; border: 1px solid #fff; }
        
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; background: #f9f9f9; }
        .brand { font-weight: bold; font-size: 13px; margin-top: 10px; text-transform: uppercase; color: #000; }
        .name { font-size: 12px; color: #666; height: 32px; margin: 4px 0; overflow: hidden; }
        .price-info { font-size: 11px; color: var(--main); font-weight: bold; margin-bottom: 8px; }
        
        select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; background: #fff; }
        .total { font-size: 18px; font-weight: 900; margin-bottom: 10px; color: #000; }
        .order-btn { background: #000; color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .order-btn:active { background: #333; transform: scale(0.95); }

        /* Сповіщення */
        #copyNotice {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; padding: 25px; border-radius: 20px; z-index: 1000; text-align: center;
            width: 80%; max-width: 280px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.85); border: 3px solid var(--viber);
        }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/CxkmFFJ3/logo.png" class="logo">
    <h1 style="font-size:20px; margin:5px 0;">VR-PERFUMES</h1>
    <p style="font-size:11px; color:#888; margin:0;">Ексклюзивний розпив • Хмельницький</p>
</header>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="🔎 Пошук бренду або назви..." oninput="filterCatalog()">
</div>

<a href="https://invite.viber.com/?g2=AQBjzS%2BM5uBAeFRYT57vm5okC%2BGV00WHPJgDJBWE9ptyotTAmhAhpYNBmtPwZxQe" class="viber-channel">ПРИЄДНАТИСЬ ДО VIBER</a>

<div id="catalog">Завантаження аромату...</div>

<div id="copyNotice">
    <div style="font-size: 40px; margin-bottom: 10px;">📋</div>
    <b style="font-size: 18px; color: var(--viber);">СКОПІЙОВАНО!</b>
    <p style="line-height: 1.4;">Замовлення в буфері.<br><br><b>ЗАРАЗ У VIBER</b><br>натисніть <b>"ВСТАВИТИ"</b></p>
</div>

<script>
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSpreeDVfMb9m8VoH2fWjx3-P4e2XjpeFabLSODfQIBaLcXUA9T9xWfk4v_6R89JLgR-lvd0gwEakwM/pub?gid=339534482&single=true&output=csv';
    const VIBER_NUMBER = '380962178464';

    async function loadCatalog() {
        try {
            const r = await fetch(SHEET_CSV + '&t=' + Date.now());
            const data = await r.text();
            let rows = data.split('\n').slice(1).map(row => {
                return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
            }).filter(c => c.length >= 3 && c[0]);

            // Сортування за датою (стовпець G / 7-й)
            rows.sort((a, b) => new Date(b[6] || 0) - new Date(a[6] || 0));

            const container = document.getElementById('catalog');
            container.innerHTML = '';
            const today = new Date();

            rows.forEach(c => {
                const brand = c[0], name = c[1], price = parseFloat(c[2].replace(',','.')) || 0, 
                      min = parseInt(c[3]) || 2, img = c[5] || '', dateRaw = c[6] || '2000-01-01';

                const date = new Date(dateRaw);
                const isNew = (today - date) / (1000 * 60 * 60 * 24) <= 14;

                let options = '';
                [2, 5, 10].forEach(ml => {
                    if (ml >= min) {
                        let sum = Math.round(ml * price); // Пряма математика без знижок
                        options += `<option value="${ml}" data-p="${sum}">${ml} мл — ${sum} грн</option>`;
                    }
                });

                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-search', (brand + ' ' + name).toLowerCase());
                card.innerHTML = `
                    ${isNew ? '<div class="new-badge">Новинка!</div>' : ''}
                    <img src="${img}" onerror="this.src='https://i.postimg.cc/CxkmFFJ3/logo.png'">
                    <div class="brand">${brand}</div>
                    <div class="name">${name}</div>
                    <div class="price-info">1 мл = ${Math.round(price)} грн</div>
                    <select onchange="this.nextElementSibling.innerText = this.options[this.selectedIndex].getAttribute('data-p') + ' грн'">${options}</select>
                    <div class="total">${Math.round(min * price)} грн</div>
                    <button class="order-btn" onclick="sendToViber('${brand} ${name}', this)">ЗАМОВИТИ</button>
                `;
                container.appendChild(card);
            });
        } catch (e) { document.getElementById('catalog').innerHTML = "Помилка завантаження."; }
    }

    function filterCatalog() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            const text = card.getAttribute('data-search');
            card.style.display = text.includes(query) ? 'flex' : 'none';
        });
    }

    function sendToViber(item, btn) {
        const select = btn.previousElementSibling.previousElementSibling;
        const ml = select.value;
        const sum = btn.previousElementSibling.innerText;
        const msg = `🛍️ ЗАМОВЛЕННЯ:\n${item}\nОб'єм: ${ml} мл\nСума: ${sum}`;

        const el = document.createElement("textarea");
        el.value = msg; document.body.appendChild(el);
        el.select(); document.execCommand("copy");
        document.body.removeChild(el);

        const notice = document.getElementById('copyNotice');
        notice.style.display = 'block';
        setTimeout(() => {
            notice.style.display = 'none';
            window.location.href = `viber://chat?number=%2B${VIBER_NUMBER}`;
        }, 2200);
    }

    loadCatalog();
</script>
</body>
</html>
