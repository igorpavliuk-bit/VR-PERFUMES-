<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR-PERFUMES | Контакти</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --gold: #c5a059;
            --text-light: #f5f5f5;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(197, 160, 89, 0.25);
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, rgba(197, 160, 89, 0.12) 0%, transparent 60%);
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 50px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1s ease;
        }
        
        /* НОВИЙ ЕСТЕТИЧНИЙ ЛОГОТИП (М'який квадрат) */
        .logo-wrapper {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo-img {
            width: 140px;
            height: auto;
            border-radius: 20px; /* М'які кути */
            border: 1px solid rgba(197, 160, 89, 0.3); /* Тонка золота рамка */
            box-shadow: 0 15px 35px rgba(197, 160, 89, 0.15); /* Золоте світіння */
            display: block;
        }

        .brand-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--gold);
            margin: 0 0 8px 0;
            text-align: center;
        }
        .bio {
            font-size: 11px;
            color: #888;
            margin-bottom: 35px;
            text-align: center;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 500;
        }
        .links-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .link-btn {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 16px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            text-decoration: none;
            color: var(--text-light);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-sizing: border-box;
        }
        .link-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--gold);
            margin-right: 15px;
            flex-shrink: 0;
        }
        .link-btn:active {
            transform: scale(0.96);
            background: rgba(197, 160, 89, 0.1);
            border-color: var(--gold);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
